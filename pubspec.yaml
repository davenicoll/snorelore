name: snorelore
description: "Record sleep noises overnight — snores, coughs, and sleep-talking. Classify, replay, share."
publish_to: 'none'

version: 0.4.0+4

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  record: ^6.0.0
  just_audio: ^0.9.42
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2
  share_plus: ^10.1.2
  intl: ^0.19.0
  tflite_flutter: ^0.11.0
  wakelock_plus: ^1.2.8
  uuid: ^4.5.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/snorelore.png"
  adaptive_icon_foreground: "assets/snorelore.png"
  adaptive_icon_background: "#0B1026"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/models/
